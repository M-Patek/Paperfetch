name: Bug report
description: Report a reproducible defect in the CLI, SDK, demo, or provider pipeline.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the exact command, input, or code snippet.
      render: bash
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output or traceback
      description: Paste the relevant warning, traceback, or JSON fragment.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and install method.
    validations:
      required: true
